services:
  db:
    image: postgres:16
    container_name: maca_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - maca_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - maca_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maca_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      BASE_DOMAIN: ${BASE_DOMAIN}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      STORAGE_ROOT: /app/data
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
    volumes:
      - maca_storage:/app/data
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - maca_net
    command: >
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL}
        VITE_BASE_DOMAIN: ${BASE_DOMAIN}
    container_name: maca_frontend
    restart: unless-stopped
    networks:
      - maca_net

volumes:
  maca_pgdata:
  maca_storage:

networks:
  maca_net:
