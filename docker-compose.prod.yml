services:
  db:
    image: postgres:16
    container_name: maca_postgres
    env_file: ./backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - maca_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - maca_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maca_backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      STORAGE_ROOT: /app/data
    ports:
      - "8001:8000"
    volumes:
      - maca_storage:/app/data
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - maca_net
    command: >
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL}
        VITE_BASE_DOMAIN: ${BASE_DOMAIN}
    container_name: maca_frontend
    ports:
      - "3001:80"
    restart: unless-stopped
    networks:
      - maca_net

volumes:
  maca_pgdata:
  maca_storage:

networks:
  maca_net:
